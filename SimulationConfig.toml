[parameters]
num_colors = 2
t = 1.4
u_test = 0.0
U = 8.17

[plot]
# Plot Characteristics
width = 1500
height = 1200

# Ranges
T_min = 0.02
T_max = 10
T_step = 0.02
u_min = -1
u_max = 1
u_step = 0.5

# Specific Plots to Generate
T_fixed_plots = [0.02, 0.1, 0.5]
u_fixed_plots = [-0.5, 0.0, 0.5, 4]
# Observables to Plot in the format:
# [subplots]
# where each subplot is:
#   [[generated observable names], [csv data names (from overlay_data)]]
observables = [
	[["Num_Particles"], []],
	[["Energy", "Actual Energy"], ["Energies"]],
	[["Entropy", "Actual Entropy"], ["Entropies"]],
	[["n^2"], []],
	[["H^2"], []],
	[["Hn"], []],
	[["na_nb"], []],
	[["Δn^2"], []],
	[["ΔH^2"], []],
	[["H"], []],
	[["Specific Heat"], []],
	[["Compressibility"], []],
	[["C_spin"], []]
]

overlay_data = "none"

nlce_orders = [2, 3, 4]

[graph]
num_sites = 1
